<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Shopping Cart</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <div class="shop-container">

        <h1>Gaming Store</h1>

        <!-- Sản phẩm 1 -->
        <div class="product" data-price="250000">

            <img src="https://cdn-icons-png.flaticon.com/512/2885/2885417.png">

            <div class="product-info">
                <h2>Gaming Mouse</h2>

                <p>250.000 VNĐ</p>

                <div class="quantity-box">

                    <button class="minus">-</button>

                    <span class="quantity">1</span>

                    <button class="plus">+</button>

                </div>

                <h3>
                    Thành tiền:
                    <span class="total">250000</span> VNĐ
                </h3>
            </div>

        </div>

        <!-- Sản phẩm 2 -->
        <div class="product" data-price="450000">

            <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png">

            <div class="product-info">
                <h2>Gaming Keyboard</h2>

                <p>450.000 VNĐ</p>

                <div class="quantity-box">

                    <button class="minus">-</button>

                    <span class="quantity">1</span>

                    <button class="plus">+</button>

                </div>

                <h3>
                    Thành tiền:
                    <span class="total">450000</span> VNĐ
                </h3>
            </div>

        </div>

        <!-- Sản phẩm 3 -->
        <div class="product" data-price="700000">

            <img src="https://cdn-icons-png.flaticon.com/512/3659/3659899.png">

            <div class="product-info">
                <h2>Gaming Headphone</h2>

                <p>700.000 VNĐ</p>

                <div class="quantity-box">

                    <button class="minus">-</button>

                    <span class="quantity">1</span>

                    <button class="plus">+</button>

                </div>

                <h3>
                    Thành tiền:
                    <span class="total">700000</span> VNĐ
                </h3>
            </div>

        </div>

        <!-- Tổng hóa đơn -->
        <div class="bill">

            <h2>
                Tổng hóa đơn:
                <span id="finalTotal">1400000</span> VNĐ
            </h2>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
